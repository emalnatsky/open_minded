<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Leo's Geheugen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

  <!-- ============================================================
       SCREEN 1 — WELCOME
       ============================================================ -->
  <section id="screen-welcome" class="screen active">
    <img src="/static/images/background.png" class="bg-img" alt="" />

    <!-- Closed book on the right -->
    <div class="welcome-book" id="welcomeBook" role="button" tabindex="0" aria-label="Open Leo's geheugenboek">
      <div class="book-glow"></div>
      <img src="/static/images/book_closed.png" class="welcome-book-img" alt="Boek" />
      <div class="welcome-book-title" id="welcomeBookTitle">
        <span class="welcome-book-sub">Geheugenboek</span>
        <span class="welcome-book-van">van</span>
        <span class="welcome-book-name" id="welcomeBookName"></span>
      </div>
    </div>

    <!-- Robot on the left with speech bubble -->
    <div class="welcome-robot">
      <div class="speech-bubble" id="welcomeBubble">
        <span class="bubble-text" id="welcomeBubbleText">Klik op mijn boek om meer te ontdekken!</span>
        <div class="bubble-tail bubble-tail-down"></div>
      </div>
      <img src="/static/images/robocik.png" class="robot-img" alt="Leo" />
    </div>
  </section>

  <!-- ============================================================
       SCREEN 2 — TABLE OF CONTENTS
       ============================================================ -->
  <section id="screen-toc" class="screen">
    <img src="/static/images/background.png" class="bg-img bg-dim" alt="" />

    <button class="back-btn" data-back-to="welcome" aria-label="Terug">
      <span class="back-arrow">◀</span><span>TERUG</span>
    </button>

    <div class="book-stage">
      <div class="open-book" id="tocBook">
        <img src="/static/images/book.png" class="book-bg" alt="" />

      <!-- Left page: first 5 categories -->
        <div class="page page-left">
          <h1 class="page-title">Inhoudsopgave</h1>
          <div class="page-title-underline"></div>
          <ul class="toc-list" id="tocListLeft"></ul>
        </div>

  <!-- Right page: last 5 categories -->
        <div class="page page-right">
          <h1 class="page-title">&nbsp;</h1>
          <div class="page-title-underline" style="visibility:hidden"></div>
          <ul class="toc-list" id="tocListRight"></ul>
        </div>
      </div>
    </div>


    <div class="robot-bottom">
      <img src="/static/images/robocik.png" class="robot-img robot-small" alt="" />
      <div class="speech-bubble bubble-mini">
        <span class="bubble-text">Klik op de categorie die je wilt lezen!</span>
        <div class="bubble-tail bubble-tail-left"></div>
      </div>
    </div>
  </section>

  <!-- ============================================================
       SCREEN 3 — CATEGORY PAGE
       ============================================================ -->
  <section id="screen-category" class="screen">
    <img src="/static/images/background.png" class="bg-img bg-dim" alt="" />

    <button class="back-btn" data-back-to="toc" aria-label="Terug">
      <span class="back-arrow">◀</span><span>TERUG</span>
    </button>

    <div class="book-stage">
      <div class="open-book" id="categoryBook">
        <img src="/static/images/book.png" class="book-bg" alt="" />

        <!-- Left page: category title -->
        <div class="page page-left">
          <div class="cat-header">
            <div class="cat-icon-big" id="catIconBig">🎨</div>
            <h1 class="cat-title-big" id="catTitleBig">Hobby's</h1>
            <div class="cat-underline" id="catUnderline"></div>
          </div>
          <div class="cat-meta">
            <div class="meta-row">
              <span class="meta-label">Wat Leo weet</span>
              <span class="meta-value" id="catCount">0</span>
            </div>
          </div>
        </div>

        <!-- Right page: pills -->
        <div class="page page-right">
          <h2 class="right-page-title">Mijn aantekeningen</h2>
          <div class="pills-container" id="pillsContainer"></div>
          <div class="empty-state" id="emptyState">
            <span class="empty-icon">✎</span>
            <p class="empty-text">Leo heeft hier nog niets opgeschreven...</p>
          </div>
        </div>
      </div>
    </div>

    <div class="robot-bottom">
      <img src="/static/images/robocik.png" class="robot-img robot-small" alt="" />
      <div class="speech-bubble bubble-mini">
        <span class="bubble-text" id="catBubbleText">Hobby's</span>
        <div class="bubble-tail bubble-tail-left"></div>
      </div>
    </div>
  </section>

  <!-- Connection indicator -->
  <div class="conn-indicator" id="connIndicator">
    <div class="conn-dot"></div>
    <span class="conn-text" id="connText">Verbinden…</span>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
