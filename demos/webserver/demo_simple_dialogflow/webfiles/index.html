<!doctype html>
<html lang="en">
  <head>
    <!--
      Dialogflow CX single-user web demo.

      This page connects to the SIC webserver via Socket.IO, streams microphone
      audio to the backend, and visualises both the recognised transcript and
      the agent's reply. The Python `DialogflowCXWebDemo` application is
      responsible for running the Dialogflow turn-taking logic.
    -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dialogflow CX Demo</title>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f6f7fb;
        color: #0f172a;
      }
      .wrap { max-width: 900px; margin: 0 auto; }
      .card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 10px 25px rgba(2, 8, 23, 0.06);
        margin-bottom: 14px;
      }
      h1 { margin: 0 0 6px; font-size: 20px; }
      .muted { color: #475569; font-size: 14px; }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: #475569;
        margin-top: 10px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #ef4444;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
      }
      .dot.ok {
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
      }
      .row { display: grid; gap: 10px; }
      .label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; }
      .bubble {
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        min-height: 48px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .controls {
        margin-top: 14px;
        display: flex;
        align-items: center;
      }
      .btn {
        border-radius: 999px;
        border: none;
        padding: 14px 22px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn-mic {
        background: #0f766e;
        color: #ffffff;
      }
      .btn-mic.recording {
        background: #b91c1c;
        transform: translateY(1px);
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Dialogflow CX Demo</h1>
        <div class="muted">Shows what the system understood (transcript) and the agent response.</div>
        <div class="status">
          <span id="dot" class="dot"></span>
          <span id="connText">Connecting…</span>
        </div>
        <div class="controls">
          <button id="micButton" class="btn btn-mic" disabled>
            <span id="micLabel">Enable microphone</span>
          </button>
        </div>
      </div>

      <div class="card row">
        <div class="label">User transcript</div>
        <div id="transcript" class="bubble">—</div>
      </div>

      <div class="card row">
        <div class="label">Agent response</div>
        <div id="response" class="bubble">—</div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
    <script>
      const dot = document.getElementById("dot");
      const connText = document.getElementById("connText");
      const transcriptEl = document.getElementById("transcript");
      const responseEl = document.getElementById("response");
      const micButton = document.getElementById("micButton");
      const micLabel = document.getElementById("micLabel");

      let audioContext = null;
      let mediaStream = null;
      let processor = null;
      let isRecording = false;

      function setConnected(isConnected) {
        dot.classList.toggle("ok", isConnected);
        connText.textContent = isConnected ? "Connected" : "Disconnected";
        micButton.disabled = !isConnected;
      }

      function setError(text) {
        dot.classList.remove("ok");
        connText.textContent = text;
      }

      function setTranscript(text) {
        transcriptEl.textContent = (text && String(text).trim()) ? String(text) : "—";
      }

      function setResponse(text) {
        responseEl.textContent = (text && String(text).trim()) ? String(text) : "—";
      }

      function floatTo16BitPCM(float32Array) {
        const buffer = new ArrayBuffer(float32Array.length * 2);
        const view = new DataView(buffer);
        for (let i = 0; i < float32Array.length; i++) {
          let s = Math.max(-1, Math.min(1, float32Array[i]));
          view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
        }
        return new Uint8Array(buffer);
      }

      async function startRecording(socket) {
        if (isRecording) return;
        socket.emit("sic/button_clicked", { type: "start_audio" });
        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
          setError("Mic permission denied");
          return;
        }

        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: 44100,
        });

        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = (event) => {
          if (!isRecording) return;
          const input = event.inputBuffer.getChannelData(0);
          const pcm16 = floatTo16BitPCM(input);
          socket.emit("sic/button_clicked", {
            type: "audio_chunk",
            sample_rate: audioContext.sampleRate,
            audio: Array.from(pcm16),
          });
        };

        source.connect(processor);
        processor.connect(audioContext.destination);
        isRecording = true;
        connText.textContent = "Recording…";
        micButton.classList.add("recording");
        micLabel.textContent = "Stop microphone";
      }

      function stopRecording(socket) {
        if (!isRecording) return;
        isRecording = false;

        if (processor) {
          try { processor.disconnect(); } catch (_) {}
          processor = null;
        }
        if (audioContext) {
          try { audioContext.close(); } catch (_) {}
          audioContext = null;
        }
        if (mediaStream) {
          mediaStream.getTracks().forEach((t) => t.stop());
          mediaStream = null;
        }

        socket.emit("sic/button_clicked", { type: "stop_audio" });
        connText.textContent = "Connected";
        micButton.classList.remove("recording");
        micLabel.textContent = "Start microphone";
      }

      function startSocket() {
        if (typeof window.io !== "function") {
          setError("Socket.IO client failed to load.");
          return;
        }

        const socket = io();
        socket.on("connect", () => setConnected(true));
        socket.on("disconnect", () => setConnected(false));
        socket.on("connect_error", (err) => {
          const msg = (err && err.message) ? err.message : String(err || "connect_error");
          setError("Socket.IO connect_error: " + msg);
        });
        setConnected(false);

        socket.on("sic/state", (p) => {
          if (!p || typeof p !== "object") return;
          if (p.transcript != null) setTranscript(p.transcript);
          if (p.webinfo && typeof p.webinfo === "object") {
            if (p.webinfo.agent_response != null) setResponse(p.webinfo.agent_response);
          }
        });

        socket.on("sic/transcript", (p) => {
          if (p && typeof p === "object" && "transcript" in p) setTranscript(p.transcript);
        });

        socket.on("sic/webinfo", (p) => {
          if (!p || typeof p !== "object") return;
          if (p.label === "agent_response") setResponse(p.message);
          if (p.label === "turn_done" && isRecording) {
            stopRecording(socket);
          }
        });

        micButton.addEventListener("click", () => {
          if (!isRecording) {
            startRecording(socket);
          } else {
            stopRecording(socket);
          }
        });
      }

      window.addEventListener("load", () => {
        startSocket();
        // If connect never happens and no error fired, show a hint.
        setTimeout(() => {
          if (connText.textContent === "Connecting…") {
            setError("Still connecting… (check browser console + server Engine.IO logs)");
          }
        }, 2500);
      });
    </script>
  </body>
</html>
